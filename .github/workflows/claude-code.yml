name: Claude Code

# SAFE BY DESIGN — this workflow is INERT until a credential secret is added in GitHub repo settings.
# It runs ONLY when someone comments "@claude" on an issue/PR, or via manual workflow_dispatch.
# It NEVER runs on push, NEVER auto-merges, NEVER deploys. Claude Code works on a branch/PR only;
# the owner reviews and merges manually. Push to main / production deploy stay manual + approved.
#
# To ACTIVATE (owner, in GitHub — not in chat):
#   Settings → Secrets and variables → Actions → New repository secret:
#     CLAUDE_CODE_OAUTH_TOKEN  (recommended — uses your Claude subscription, no extra API billing;
#                               generate locally with `claude setup-token`)
#   OR  ANTHROPIC_API_KEY      (uses the paid Anthropic API — incurs metered cost)
# Without one of these secrets the job no-ops/fails harmlessly and nothing is charged.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch: {}

jobs:
  claude:
    # Only react to an explicit @claude mention (or manual dispatch).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.comment != null && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create branches / commits on a branch (NOT main)
      pull-requests: write    # open PRs for owner review (no auto-merge)
      issues: write           # comment back on the issue
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      # Auth: use the subscription OAuth token (no extra API billing). Pass ONLY the token that is
      # set — passing an empty anthropic_api_key alongside it breaks auth. To use the paid API
      # instead, replace the line below with: anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
